name: Mobile App
on:
  pull_request:
    paths:
      - .github/workflows/mobile-app.yml
      - .github/actions/setup-app/action.yml
      - app/**

  push:
    paths:
      - .github/workflows/mobile-app.yml
      - .github/actions/setup-app/action.yml
      - app/**
    branches:
      - main

env:
  HUSKY: "0"

defaults:
  run:
    working-directory: app

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/setup-app

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint and Format
        run: pnpm lint

  e2e_tests:
    name: E2E tests (IOS) 📱
    runs-on: macos-latest
    steps:
      - uses: ./.github/actions/setup-app

      - name: Generate native iOS project
        run: pnpm expo prebuild --platform ios

      - name: Install simulator
        run: |
          UDID="$(xcrun simctl create "iPhone 12" com.apple.CoreSimulator.SimDeviceType.iPhone-12)"
          echo "UDID=${UDID}" >> "${GITHUB_ENV}"

      - name: Build simulator .app
        run: |
          xcodebuild \
            -workspace "ios/sabr.xcworkspace" \
            -scheme sabr \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=${UDID}" \
            -derivedDataPath ios/build \
            build

      - name: Launch simulator
        run: xcrun simctl boot "${UDID}"

      - name: Install app onto simulator
        run: xcrun simctl install booted ios/build/Build/Products/Release-iphonesimulator/sabr.app

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro
        env:
          MAESTRO_CLI_NO_ANALYTICS: true
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "120000"
        run: maestro test .maestro
