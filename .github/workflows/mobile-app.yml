name: Mobile App
on:
  pull_request:
    # Assumes all PRs to the main branch will be from the develop branch
    branches-ignore: [main]
    paths:
      - .github/actions/setup-app/action.yml
      - .github/actions/setup-e2e-tests/action.yml
      - .github/actions/upload-maestro-test-artifacts/action.yml
      - .github/workflows/mobile-app.yml
      - app/**

  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

defaults:
  run:
    working-directory: app

env:
  HUSKY: "0"

jobs:
  static-checks-and-unit-integration-tests:
    name: Static checks and unit/integration tests 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-app

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint and format
        run: pnpm lint

      - name: Unit and integration tests
        run: pnpm test:unit-integration

  resolve-variables-for-environment:
    name: Resolve variables for e2e test environment
    runs-on: ubuntu-latest
    outputs:
      ENVIRONMENT: ${{ steps.resolve.outputs.ENVIRONMENT }}
      MAESTRO_MAIL_PROVIDER: ${{ steps.resolve.outputs.MAESTRO_MAIL_PROVIDER }}
      VARIANT: ${{ steps.resolve.outputs.VARIANT }}
    steps:
      - id: resolve
        working-directory: .
        run: |
          # When merging to the "develop" or "main" branches
          if [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/develop" || "${{ github.ref }}" == "refs/heads/main") ]]; then
            # Run e2e tests on the staging environment
            echo "ENVIRONMENT=staging" >> "$GITHUB_OUTPUT"
            echo "MAESTRO_MAIL_PROVIDER=resend"  >> "$GITHUB_OUTPUT"
            echo "VARIANT=release" >> "$GITHUB_OUTPUT"
          else
            # Run tests on a local supabase instance
            echo "ENVIRONMENT=" >> "$GITHUB_OUTPUT"
            echo "MAESTRO_MAIL_PROVIDER=mailpit" >> "$GITHUB_OUTPUT"
            echo "VARIANT=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Print variables
        working-directory: .
        run: echo '${{ toJSON(steps.resolve.outputs) }}'

  e2e-tests-ios:
    name: E2E tests - IOS 📱
    runs-on: macos-26
    # TODO: Docker is not supported on macos-26 runners, and there is no easy way to run it on a macos-26+ runner in a fast and reliable way.
    # The following "if" statement should be removed once Docker is supported on macos-26 runners.
    # See https://github.com/actions/runner-images/issues/13505
    if: ${{ needs.resolve-variables-for-environment.outputs.MAESTRO_MAIL_PROVIDER != 'mailpit' }}
    needs: resolve-variables-for-environment
    environment: ${{ needs.resolve-variables-for-environment.outputs.ENVIRONMENT }}
    env:
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      MAESTRO_MAIL_PROVIDER: ${{ needs.resolve-variables-for-environment.outputs.MAESTRO_MAIL_PROVIDER }}
      MAESTRO_RESEND_API_KEY: ${{ secrets.MAESTRO_RESEND_API_KEY }}
      VARIANT: ${{ needs.resolve-variables-for-environment.outputs.VARIANT == 'release' && 'Release' || 'Debug' }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e-tests
        with:
          platform: ios

      - name: Install simulator
        id: install-simulator
        run: |
          SIM_ID="$(xcrun simctl create "iPhone 12" com.apple.CoreSimulator.SimDeviceType.iPhone-12)"
          echo "SIM_ID=${SIM_ID}" >> "$GITHUB_OUTPUT"

      - name: Get fingerprint
        id: fingerprint
        uses: expo/expo-github-action/continuous-deploy-fingerprint-info@main
        with:
          profile: development-ios-simulator
          working-directory: ${{ github.workspace }}/app
          # TODO: REMOVE THE LINE BELOW!!!
          platform: ios

      - name: EAS Build
        if: ${{ steps.fingerprint.outputs.ios-build-id == '' }}
        id: build
        run: |
          BUILD_ID=$(eas build --non-interactive --profile=development-ios-simulator -p ios --json | jq -r '.[0].id')
          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Install EAS Build
        run: eas build:run --id ${{ steps.build.outputs.BUILD_ID || steps.fingerprint.outputs.ios-build-id }} -p ios --simulator ${{ steps.install-simulator.outputs.SIM_ID }}

      # - name: Build ${{ needs.resolve-variables-for-environment.outputs.VARIANT }} simulator .app
      #   run: |
      #     xcodebuild \
      #       -workspace "ios/sabr.xcworkspace" \
      #       -scheme sabr \
      #       -configuration ${VARIANT} \
      #       -sdk iphonesimulator \
      #       -destination "id=${UDID}" \
      #       -derivedDataPath ios/build \
      #       build

      # - name: Launch simulator
      #   run: xcrun simctl boot "${UDID}"

      # - name: Install app onto simulator
      #   run: xcrun simctl install booted ios/build/Build/Products/${VARIANT}-iphonesimulator/sabr.app

      - name: Run Maestro on iOS simulator
        env:
          MAESTRO_CLI_NO_ANALYTICS: true
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
        run: pnpm test:e2e

      - uses: ./.github/actions/upload-maestro-test-artifacts
        if: failure()
        with:
          name: ios

  e2e-tests-android:
    name: E2E tests - Android 🤖
    runs-on: ubuntu-latest
    needs: resolve-variables-for-environment
    environment: ${{ needs.resolve-variables-for-environment.outputs.ENVIRONMENT }}
    env:
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      MAESTRO_MAIL_PROVIDER: ${{ needs.resolve-variables-for-environment.outputs.MAESTRO_MAIL_PROVIDER }}
      MAESTRO_RESEND_API_KEY: ${{ secrets.MAESTRO_RESEND_API_KEY }}
      VARIANT: ${{ needs.resolve-variables-for-environment.outputs.VARIANT }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e-tests
        id: setup-e2e-tests
        with:
          platform: android
          expo-token: ${{ secrets.EXPO_TOKEN }}

      # See https://github.com/ReactiveCircus/android-emulator-runner#running-hardware-accelerated-emulators-on-linux-runners
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # Used to cache Gradle and make builds faster
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # - name: Build ${{ needs.resolve-variables-for-environment.outputs.VARIANT }} APK
      #   run: ./android/gradlew -p android assemble${VARIANT^} -PreactNativeArchitectures=x86_64

      - name: Run Maestro on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MAESTRO_CLI_NO_ANALYTICS: true
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        with:
          api-level: 34
          arch: x86_64
          working-directory: app
          script: |
            if [ "$VARIANT" = "debug" ]; then adb reverse tcp:54321 tcp:54321; adb reverse tcp:8081 tcp:8081; fi
            eas build:run --id ${{ steps.setup-e2e-tests.outputs.build-id }} -p android
            pnpm test:e2e

      - uses: ./.github/actions/upload-maestro-test-artifacts
        if: failure()
        with:
          name: android
