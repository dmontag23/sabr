name: Mobile App
on:
  pull_request:
    # Assumes all PRs to the main branch will be from the develop branch
    branches-ignore: [main]
    paths:
      - .github/actions/setup-app/action.yml
      - .github/actions/setup-e2e-tests/action.yml
      - .github/actions/upload-maestro-test-artifacts/action.yml
      - .github/workflows/mobile-app.yml
      - app/**

  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

defaults:
  run:
    working-directory: app

env:
  HUSKY: "0"
  MAESTRO_CLI_NO_ANALYTICS: true
  MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
  MAESTRO_MAIL_PROVIDER: ${{ github.event_name == 'push' && 'resend' || 'mailpit' }}

jobs:
  static-checks-and-unit-integration-tests:
    name: Static checks and unit/integration tests 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-app

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint and format
        run: pnpm lint

      - name: Unit and integration tests
        run: pnpm test:unit-integration

  e2e-tests-ios:
    name: E2E tests - IOS 📱
    runs-on: macos-26
    # TODO: Docker is not supported on macos-26 runners, and there is no easy way to run it on a macos-26+ runner in a fast and reliable way.
    # The following "if" statement should be removed once Docker is supported on macos-26 runners.
    # See https://github.com/actions/runner-images/issues/13505
    if: ${{ github.event_name == 'push' }}
    environment: ${{ github.event_name == 'push' && 'staging' || '' }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      MAESTRO_RESEND_API_KEY: ${{ secrets.MAESTRO_RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e-tests
        id: setup-e2e-tests
        with:
          env-vars-json: ${{ toJSON(vars) }}
          platform: ios

      - name: Install simulator
        id: install-simulator
        run: |
          SIM_ID="$(xcrun simctl create "iPhone 12" com.apple.CoreSimulator.SimDeviceType.iPhone-12)"
          echo "sim-id=$SIM_ID" >> "$GITHUB_OUTPUT"

      - name: Install EAS build
        run: eas build:run -p ios --simulator ${{ steps.install-simulator.outputs.sim-id }} ${{ steps.setup-e2e-tests.outputs.eas-build-run-args }}

      - name: Run Maestro on iOS simulator
        run: pnpm test:e2e

      - uses: ./.github/actions/upload-maestro-test-artifacts
        if: failure()
        with:
          name: ios

  e2e-tests-android:
    name: E2E tests - Android 🤖
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'staging' || '' }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      MAESTRO_RESEND_API_KEY: ${{ secrets.MAESTRO_RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e-tests
        id: setup-e2e-tests
        with:
          env-vars-json: ${{ toJSON(vars) }}
          platform: android

      # See https://github.com/ReactiveCircus/android-emulator-runner#running-hardware-accelerated-emulators-on-linux-runners
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          working-directory: app
          script: |
            if [ "$MAESTRO_MAIL_PROVIDER" = "mailpit" ]; then adb reverse tcp:54321 tcp:54321; adb reverse tcp:8081 tcp:8081; fi
            eas build:run -p android ${{ steps.setup-e2e-tests.outputs.eas-build-run-args }}
            pnpm test:e2e

      - uses: ./.github/actions/upload-maestro-test-artifacts
        if: failure()
        with:
          name: android
