name: Enforce main PR source
on:
  pull_request_target:
    branches: [main]

jobs:
  enforce-pr-source:
    name: PR source must be the develop branch
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR is from the develop branch
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "Only the 'develop' branch may open a PR into the 'main' branch."
            exit 1
          fi
          echo "PR is from the 'develop' branch."
