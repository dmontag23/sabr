name: Setup e2e tests
description: Prerequisites for running e2e tests on a mobile emulator
inputs:
  platform:
    description: Platform to run tests on ("ios" or "android")
    required: true
outputs:
  run-args:
    description: Args for `eas build:run` (either --id <id> or --path <file>)
    value: ${{ steps.repack.outputs.args || format('--id {0}', steps.build.outputs.BUILD_ID || steps.fingerprint.outputs[format('{0}-build-id', inputs.platform)]) }}

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-app

    - name: 🏗 Setup EAS CLI
      uses: expo/expo-github-action@main
      env:
        PNPM_CONFIG_STRICT_DEP_BUILDS: "false"
      with:
        packager: pnpm
        eas-version: latest

    - name: Resolve EAS profile
      id: profile
      shell: bash
      run: |
        if [ "$MAESTRO_MAIL_PROVIDER" = "mailpit" ]; then
          echo "value=development" >> "$GITHUB_OUTPUT"
        elif [ "${{ inputs.platform }}" = "ios" ]; then
          echo "value=staging-ios-simulator" >> "$GITHUB_OUTPUT"
        else
          echo "value=staging" >> "$GITHUB_OUTPUT"
        fi

    - name: Get fingerprint
      id: fingerprint
      uses: expo/expo-github-action/continuous-deploy-fingerprint-info@main
      with:
        profile: ${{ steps.profile.outputs.value }}
        working-directory: app
        platform: ${{ inputs.platform }}

    - name: EAS Build
      if: ${{ steps.fingerprint.outputs[format('{0}-build-id', inputs.platform)] == '' }}
      id: build
      working-directory: app
      # TODO: Build based on PR, merge to develop, etc!!!
      shell: bash
      run: |
        BUILD_ID=$(eas build --non-interactive --profile=${{ steps.profile.outputs.value }} -p ${{ inputs.platform }} --json | jq -r '.[0].id')
        echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_OUTPUT"

    - name: Repack JS into release build
      if: ${{ steps.profile.outputs.value != 'development' && steps.build.outputs.BUILD_ID == '' }}
      id: repack
      working-directory: app
      shell: bash
      run: |
        mkdir source && (cd source && eas build:download --non-interactive --build-id "${{ steps.fingerprint.outputs[format('{0}-build-id', inputs.platform)] }}")
        if [ "${{ inputs.platform }}" = "android" ]; then
          keytool -genkeypair -keyalg RSA -validity 10000 -dname "CN=e2e" -alias e2e -keystore e2e.jks -storepass android -keypass android
          SIGN="--ks e2e.jks --ks-key-alias e2e"
        fi
        npx @expo/repack-app -p ${{ inputs.platform }} --source-app source/* $SIGN
        echo "args=--path $PWD/repacked.${{ inputs.platform == 'ios' && 'app' || 'apk' }}" >> "$GITHUB_OUTPUT"

    - name: Install Maestro
      shell: bash
      run: |
        curl -fsSL "https://get.maestro.mobile.dev" | bash
        echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

    - name: Set up Supabase CLI
      if: env.MAESTRO_MAIL_PROVIDER == 'mailpit'
      uses: supabase/setup-cli@v2

    - name: Start local Supabase instance
      if: env.MAESTRO_MAIL_PROVIDER == 'mailpit'
      shell: bash
      run: |
        supabase start
        eval "$(supabase status -o env)"
        echo "EXPO_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
        echo "EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
        echo "MAESTRO_MAILPIT_URL=$MAILPIT_URL" >> "$GITHUB_ENV"

    - name: Start Metro
      if: env.MAESTRO_MAIL_PROVIDER == 'mailpit'
      shell: bash
      working-directory: app
      run: nohup pnpm start &
