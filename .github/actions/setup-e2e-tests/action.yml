name: Setup e2e tests
description: Install the EAS toolchain + Maestro, and for the development environment start a local Supabase instance + Metro
inputs:
  environment:
    description: The environment in which the tests run.
    required: true

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-app

    - uses: expo/expo-github-action@main
      with:
        eas-version: latest

    - name: Install Maestro
      shell: bash
      run: |
        curl -fsSL "https://get.maestro.mobile.dev" | bash
        echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

    - name: Start local Supabase instance
      if: ${{ inputs.environment == 'development' }}
      uses: ./.github/actions/setup-local-supabase

    - name: Start Metro
      if: ${{ inputs.environment == 'development' }}
      shell: bash
      working-directory: app
      run: nohup pnpm start &
