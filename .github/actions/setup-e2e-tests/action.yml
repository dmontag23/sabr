name: Setup e2e tests
description: Install the EAS toolchain + Maestro, and for the development environment start a local Supabase instance + Metro
inputs:
  environment:
    description: The environment in which the tests run.
    required: true

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-eas

    - name: Install Maestro
      shell: bash
      run: |
        curl -fsSL "https://get.maestro.mobile.dev" | bash
        echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

    - name: Set up Supabase CLI
      if: ${{ inputs.environment == 'development' }}
      uses: supabase/setup-cli@v2

    - name: Start local Supabase instance
      if: ${{ inputs.environment == 'development' }}
      shell: bash
      run: |
        supabase start
        eval "$(supabase status -o env)"
        echo "EXPO_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
        echo "EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
        echo "MAESTRO_MAILPIT_URL=$MAILPIT_URL" >> "$GITHUB_ENV"

    - name: Start Metro
      if: ${{ inputs.environment == 'development' }}
      shell: bash
      working-directory: app
      run: nohup pnpm start &
