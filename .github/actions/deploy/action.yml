name: Deploy app
description: Publish an EAS update (with a QR comment on PRs) and, on production, submit fresh builds to the app stores.
inputs:
  environment:
    description: The environment to deploy.
    required: true
  eas-environment:
    description: The EAS environment containing the environment variables on EAS Cloud.
    required: true
  android-build-id:
    description: The Android build to submit on production.
    required: false
  ios-build-id:
    description: The iOS build to submit on production.
    required: false

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-eas

    - name: Publish EAS update (+ QR comment on PRs)
      uses: expo/expo-github-action/preview@main
      with:
        working-directory: app
        comment: ${{ inputs.environment == 'development' }}
        command: eas update --auto --branch ${{ inputs.environment == 'development' && github.head_ref || inputs.environment }} --environment ${{ inputs.eas-environment }}

    - name: Submit Android build to the store
      if: ${{ inputs.environment == 'production' && inputs.android-build-id != '' }}
      working-directory: app
      shell: bash
      run: eas submit -p android --id ${{ inputs.android-build-id }} --non-interactive

    - name: Submit iOS build to the store
      if: ${{ inputs.environment == 'production' && inputs.ios-build-id != '' }}
      working-directory: app
      shell: bash
      run: eas submit -p ios --id ${{ inputs.ios-build-id }} --non-interactive
